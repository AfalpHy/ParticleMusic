<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div id="entire-body">

    <div id="sidebar">
      <div id="title"> Particle Music
      </div>
      <div id="playlist">
        open-songs-directory
      </div>
    </div>

    <div id="main-body">
      <div class="custom-title-bar">
        <div class="window-controls">
          <button class="minimize"></button>
          <button class="maximize"></button>
          <button class="close"></button>
        </div>
      </div>
      <div id="song-list">
        <div id="song-label">
          <div class="title-bar-column" id="#">#</div>
          <div class="title-bar-column" id="Title">Title</div>
          <div class="title-bar-column" id="artist">Artist</div>
          <div class="title-bar-column" id="album">Album</div>
          <div class="title-bar-column" id="duration">Duration</div>
        </div>
        <div id="songs"> </div>
      </div>
    </div>

    <div id="music-controls">
      <div class="play-controls">
        <button class="last-btn"></button>
        <button class="play-pause-btn"></button>
        <button class="next-btn"></button>
      </div>

      <div class="progress-container">
        <div class="current-time">00:00</div>

        <input type="range" class="progress" min="0" max="100" value="0">

        <div class="total-time"> 00:00</div>
      </div>

      <div class="volume-control">
        <div class="volume-icon"> </div>
        <input type="range" class="volume" min="0" max="100" value="30">
      </div>
    </div>

    <div id="lyrics-body">
      <div class="custom-title-bar">
        <div id="lyric-control">
          <button id="pull"></button>
        </div>
        <div class="window-controls">
          <button class="minimize"></button>
          <button class="maximize"></button>
          <button class="close"></button>
        </div>
      </div>
      <div id="lyrics-container">
        <div id="lyrics-display"></div>
      </div>
      <div id="vice-music-controls">
        <div class="play-controls">
          <button class="last-btn"></button>
          <button class="play-pause-btn"></button>
          <button class="next-btn"></button>
        </div>

        <div class="progress-container">
          <div class="current-time">00:00</div>

          <input type="range" class="progress" min="0" max="100" value="0">

          <div class="total-time"> 00:00</div>
        </div>

        <div class="volume-control">
          <div class="volume-icon"> </div>
          <input type="range" class="volume" min="0" max="100" value="30">
        </div>
      </div>
    </div>

  </div>
  <audio id="audio-player"></audio>

  <script src="renderer.js"></script>
</body>

</html>
