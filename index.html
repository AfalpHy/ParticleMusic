<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/customTitleBar.css">
  <link rel="stylesheet" href="css/songList.css">
  <link rel="stylesheet" href="css/musicControls.css">
  <link rel="stylesheet" href="css/lyricPlane.css">
  <link rel="stylesheet" href="css/playQueue.css">
  <link rel="stylesheet" href="css/customMemu.css">

</head>

<body>
  <div id="sidebar">
    <div id="title"> Particle Music
    </div>
    <div id="playlist">
      Local Music
    </div>
  </div>

  <div id="main-plane">
    <div class="custom-title-bar">
      <input id="search" type="text">
      <div class="window-controls">
        <button class="minimize"></button>
        <button class="maximize"></button>
        <button class="close"></button>
      </div>
    </div>
    <div id="cover"></div>
    <div id="song-list">
      <div id="song-label">
        <div class="song-index">#</div>
        <div class="song-title" id="song-title-label">Title
          <div class="resizer" id="resizer1"></div>
        </div>
        <div class="artist" id="artist-label">Artist
          <div class="resizer" id="resizer2"></div>
        </div>
        <div class="album" id="album-label">Album</div>
        <div class="duration" id="duration-label">Duration</div>
      </div>
    </div>
  </div>

  <div id="music-controls">
    <div id="left-bottom">
      <img id="cover-art">
      <div id="left-bottom-title">Title</div>
      <div id="left-bottom-artist">Artist</div>
    </div>
    <div class="play-controls">
      <button class="last-btn"></button>
      <button class="play-pause-btn"></button>
      <button class="next-btn"></button>
    </div>

    <div class="progress-container">
      <div class="current-time">00:00</div>

      <input type="range" class="progress" min="0" max="100" value="0">

      <div class="total-time">00:00</div>
    </div>

    <div class="play-mode-btn-container">
      <button class="play-mode-btn"></button>
    </div>

    <div class="play-queue-btn-container">
      <button class="play-queue-btn"></button>
    </div>

    <div class="volume-control">
      <button class="volume-icon"> </button>
      <input type="range" class="volume" min="0" max="100" value="30">
    </div>
  </div>

  <div id="lyrics-plane">
    <div class="custom-title-bar">
      <div id="lyric-control">
        <button id="pull"></button>
        <button id="full-screen"></button>
      </div>
      <div class="window-controls">
        <button class="minimize"></button>
        <button class="maximize"></button>
        <button class="close"></button>
      </div>
    </div>
    <img id="lyrics-plane-cover-art">

    <div id="lyrics-plane-title-artist">
      <div id="lyrics-plane-title">Title</div>
      <div id="lyrics-plane-artist">Artist</div>
    </div>

    <div id="lyrics-container"> </div>

    <div id="vice-music-controls">
      <div class="play-controls">
        <button class="last-btn"></button>
        <button class="play-pause-btn"></button>
        <button class="next-btn"></button>
      </div>

      <div class="progress-container">
        <div class="current-time">00:00</div>

        <input type="range" class="progress" min="0" max="100" value="0">

        <div class="total-time">00:00</div>
      </div>

      <div class="play-mode-btn-container">
        <button class="play-mode-btn"></button>
      </div>

      <div class="play-queue-btn-container">
        <button class="play-queue-btn"></button>
      </div>

      <div class="volume-control">
        <button class="volume-icon"> </button>
        <input type="range" class="volume" min="0" max="100" value="30">
      </div>
    </div>
  </div>

  <div id="play-queue">
    <div id="play-queue-label">play queue
      <button id="clear-play-queue">clear</button>
    </div>
    <div id="play-queue-songs"></div>
  </div>

  <div id="song-menu">
    <div>play</div>
    <div>play next</div>
    <div>add to play queue</div>
  </div>

  <div id="play-queue-song-menu">
    <div>remove</div>
    <div>play next</div>
  </div>

  <audio id="audio-player"></audio>

  <script type="module" src="renderer/entry.js"></script>
</body>

</html>
