<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="entire-body">

    <div class="sidebar">
      <div id="title"> Particle Music
      </div>
      <div id="playlist">
        Likes
      </div>
    </div>

    <div class="main-body">
      <div class="custom-title-bar">
        <div></div>
        <div class="window-controls">
          <button class="minimize">─</button>
          <button class="maximize">□</button>
          <button class="close">✕</button>
        </div>
      </div>
      <div class="song-list">
        <div class="song-label">
          <div class="title-bar-column" id="#">#</div>
          <div class="title-bar-column" id="Title">Title</div>
          <div class="title-bar-column" id="artist">Artist</div>
          <div class="title-bar-column" id="album">Album</div>
          <div class="title-bar-column" id="duration">Duration</div>
        </div>
        <div class="songs"> </div>
      </div>
    </div>

    <div class="container">
      <div class="controls">
        <button id="last-btn">last</button>
        <button id="play-pause-btn">play</button>
        <button id="next-btn">next</button>
      </div>

      <div id="time-display">00:00 / 00:00</div>

      <div class="progress-container">
        <input type="range" id="progress" min="0" max="100" value="0">
      </div>

      <div class="volume-control">
        <span>volume:</span>
        <input type="range" id="volume" min="0" max="1" step="0.1" value="0.3">
      </div>


      <audio id="audio-player"></audio>
    </div>

    <div id="lyrics-body">
      <div class="custom-title-bar">
        <div class="lyric-control">
          <button id="pull">v</button>
        </div>
        <div class="window-controls">
          <button class="minimize">─</button>
          <button class="maximize">□</button>
          <button class="close">✕</button>
        </div>
      </div>
      <div class="lyrics-container">
        <div id="lyrics-display"></div>
      </div>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>

</html>
